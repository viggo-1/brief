name: Daily Podcast Briefing

on:
  schedule:
    # Kører hver morgen kl. 04:30 UTC (06:30 dansk tid)
    - cron: '30 4 * * *'
  workflow_dispatch:
    # Lader dig manuelt køre workflowet fra GitHubs hjemmeside

permissions:
  contents: write

jobs:
  run-brief:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci || npm install

      - name: Install Playwright and System Dependencies
        run: npx playwright install --with-deps chromium

      - name: Restore Auth Files
        run: |
          echo "${{ secrets.AUTH_STATE_JSON }}" > auth_state.json
          echo "${{ secrets.TOKEN_JSON }}" > token.json
          # Sikr dig at credentials.json også kan oprettes hvis påkrævet (bruges af gmail.js)
          echo '{"web":{"client_id":"${{ secrets.GMAIL_CLIENT_ID }}","client_secret":"${{ secrets.GMAIL_CLIENT_SECRET }}","redirect_uris":["http://localhost:3000/oauth2callback"]}}' > credentials.json

      - name: Run Daily Brief Agent
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GMAIL_CLIENT_ID: ${{ secrets.GMAIL_CLIENT_ID }}
          GMAIL_CLIENT_SECRET: ${{ secrets.GMAIL_CLIENT_SECRET }}
          GMAIL_REFRESH_TOKEN: ${{ secrets.GMAIL_REFRESH_TOKEN }}
          PODCAST_TITLE: ${{ secrets.PODCAST_TITLE }}
          PODCAST_DESCRIPTION: ${{ secrets.PODCAST_DESCRIPTION }}
          PODCAST_AUTHOR: ${{ secrets.PODCAST_AUTHOR }}
          PODCAST_SITE_URL: ${{ secrets.PODCAST_SITE_URL }}
          HEADLESS: 'true'
        run: npm start

      - name: Commit and Push Podcast Files
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Tjek om der er ændringer i podcast mappen før commit
          git add podcast/
          if git status --porcelain podcast/ | grep -q .; then
            git commit -m "Daily podcast briefing - $(date +'%Y-%m-%d') [skip ci]"
            git push origin main
          else
            echo "Ingen nye podcast-filer eller ændringer at uploade."
          fi
